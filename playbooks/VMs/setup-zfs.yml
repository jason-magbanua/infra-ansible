---
- name: Setup ZFS mirror storage for LXC containers
  hosts: proxmox_vms
  become: true

  vars:
    zfs_pool_name: user-data
    zfs_mountpoint: /user-data
    zfs_arc_max_bytes: 1073741824  # 1 GB — tune per host RAM
    zfs_disks:
      - /dev/sdb
      - /dev/sdc

  tasks:

    - name: Install ZFS utilities
      apt:
        name: zfsutils-linux
        state: present
        update_cache: true

    - name: Limit ZFS ARC cache for low memory VM
      copy:
        dest: /etc/modprobe.d/zfs.conf
        content: |
          options zfs zfs_arc_max={{ zfs_arc_max_bytes }}
      notify: update initramfs

    - name: Ensure mount directory exists
      file:
        path: "{{ zfs_mountpoint }}"
        state: directory
        mode: "0755"

    - name: Check if pool exists
      command: zpool list -H {{ zfs_pool_name }}
      register: zpool_check
      failed_when: false
      changed_when: false

    - name: Create ZFS pool (mirror)
      command: >
        zpool create
        -o ashift=12
        -O compression=lz4
        -O atime=off
        -O xattr=sa
        -O acltype=posixacl
        -O normalization=formD
        -O mountpoint={{ zfs_mountpoint }}
        {{ zfs_pool_name }}
        mirror {{ zfs_disks | join(' ') }}
      when: zpool_check.rc != 0

  handlers:

    - name: update initramfs
      command: update-initramfs -u
