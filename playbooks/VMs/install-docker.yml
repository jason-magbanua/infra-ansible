---
# Installs Docker Engine on docker-host (Ubuntu 24.04) from the official Docker apt repo.
#
# Usage:
#   ansible-playbook playbooks/VMs/install-docker.yml

- name: Install Docker Engine
  hosts: docker-host
  become: true

  vars:
    docker_arch: amd64
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  tasks:

    ############################################################
    # Prerequisites
    ############################################################

    - name: Install apt prerequisites
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    ############################################################
    # Docker apt repository
    ############################################################

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false   # skip if already present

    - name: Add Docker apt repository
      apt_repository:
        repo: >-
          deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    ############################################################
    # Install
    ############################################################

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
        update_cache: true

    ############################################################
    # Service
    ############################################################

    - name: Enable and start Docker
      systemd:
        name: docker
        enabled: true
        state: started

    ############################################################
    # Allow infra user to run docker without sudo
    ############################################################

    - name: Add infra user to docker group
      user:
        name: infra
        groups: docker
        append: true

    ############################################################
    # Verify
    ############################################################

    - name: Check Docker version
      command: docker version --format "{{ '{{' }}.Server.Version{{ '}}' }}"
      register: docker_version
      changed_when: false

    - debug:
        msg: "Docker {{ docker_version.stdout }} installed"
