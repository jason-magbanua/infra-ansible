---
- name: Static Nginx + PHP-FPM tuning (vCPU + RAM based)
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    lxd_remote: wp-host1
    php_version: "8.3"
    wordpress_domain: "{{ domain }}"
    wp_root: /var/www/html

  pre_tasks:

    - name: Ensure required variables are provided
      assert:
        that:
          - container_name | default("") != ""
          - domain | default("") != ""
        fail_msg: "container_name and domain must be provided via -e"

    - name: Get vCPU count
      command: lxc exec {{ lxd_remote }}:{{ container_name }} -- nproc
      register: vcpu_result
      changed_when: false

    - name: Get total RAM in MB
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        awk '/MemTotal/ {printf "%d", $2/1024}' /proc/meminfo
      register: ram_result
      changed_when: false

    - name: Set tuning facts based on vCPU and RAM
      set_fact:
        vcpus: "{{ vcpu_result.stdout | trim | int }}"
        ram_mb: "{{ ram_result.stdout | trim | int }}"

    - name: Set php_pm_max_children and nginx_worker_processes
      set_fact:
        php_pm_max_children: >-
          {% if (vcpus | int) == 1 and (ram_mb | int) <= 600 %}5
          {% elif (vcpus | int) == 1 and (ram_mb | int) <= 1200 %}8
          {% elif (vcpus | int) == 2 and (ram_mb | int) <= 2500 %}15
          {% elif (vcpus | int) == 2 and (ram_mb | int) > 2500 %}25
          {% else %}6
          {% endif %}
        nginx_worker_processes: >-
          {% if (vcpus | int) > 1 %}auto
          {% else %}1
          {% endif %}

  tasks:

############################################################
# OPcache
############################################################

    - name: Install OPcache
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        env DEBIAN_FRONTEND=noninteractive apt-get install -y -qq php-opcache
      changed_when: true

    - name: Render OPcache config locally
      copy:
        dest: /tmp/10-opcache.ini
        content: |
          opcache.enable=1
          opcache.memory_consumption=256
          opcache.interned_strings_buffer=16
          opcache.max_accelerated_files=20000
          opcache.validate_timestamps=1
          opcache.revalidate_freq=60

    - name: Push OPcache config to container
      command: >
        lxc file push --uid 0 --gid 0
        /tmp/10-opcache.ini
        {{ lxd_remote }}:{{ container_name }}/etc/php/{{ php_version }}/fpm/conf.d/10-opcache.ini

############################################################
# FastCGI cache + WordPress vhost
############################################################

    - name: Create FastCGI cache directory
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        bash -c "mkdir -p /var/cache/nginx && chown www-data:www-data /var/cache/nginx && chmod 755 /var/cache/nginx"
      changed_when: true

    - name: Render WordPress vhost config locally
      template:
        src: ../roles/nginx_cache/templates/nginx-wordpress.conf.j2
        dest: /tmp/{{ domain }}.conf

    - name: Push WordPress vhost config to container
      command: >
        lxc file push --uid 0 --gid 0
        /tmp/{{ domain }}.conf
        {{ lxd_remote }}:{{ container_name }}/etc/nginx/sites-available/{{ domain }}

    - name: Enable WordPress vhost
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        ln -sf /etc/nginx/sites-available/{{ domain }}
        /etc/nginx/sites-enabled/{{ domain }}

############################################################
# PHP-FPM pool
############################################################

    - name: Remove default PHP-FPM pool config
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        rm -f /etc/php/{{ php_version }}/fpm/pool.d/www.conf

    - name: Render PHP-FPM pool config locally
      template:
        src: templates/php-fpm-www.conf.j2
        dest: /tmp/php-fpm-www.conf

    - name: Push PHP-FPM pool config to container
      command: >
        lxc file push --uid 0 --gid 0
        /tmp/php-fpm-www.conf
        {{ lxd_remote }}:{{ container_name }}/etc/php/{{ php_version }}/fpm/pool.d/www.conf

############################################################
# Nginx global config
############################################################

    - name: Render Nginx global config locally
      template:
        src: templates/nginx-adaptive.conf.j2
        dest: /tmp/nginx.conf

    - name: Push Nginx global config to container
      command: >
        lxc file push --uid 0 --gid 0
        /tmp/nginx.conf
        {{ lxd_remote }}:{{ container_name }}/etc/nginx/nginx.conf

############################################################
# Restart services
############################################################

    - name: Restart PHP-FPM
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        systemctl restart php{{ php_version }}-fpm

    - name: Reload Nginx
      command: >
        lxc exec {{ lxd_remote }}:{{ container_name }} --
        systemctl reload nginx
