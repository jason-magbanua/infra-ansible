---
# site.yml — applies common roles to all hosts, then service-specific roles
# Run: ansible-playbook site.yml
# Limit to a subset: ansible-playbook site.yml --limit prometheus

- name: Apply common configuration
  hosts: all
  become: true
  gather_facts: true
  roles:
    - common
    - role: node_exporter
      when: inventory_hostname not in groups['hosts_k8s_lab'] | default([])
