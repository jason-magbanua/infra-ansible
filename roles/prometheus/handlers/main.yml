---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: reload prometheus config
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/reload"
    method: POST
    status_code: 200
  # Handlers run after all tasks, so the service is already started at this point.
  # If for some reason the service is down, this will fail visibly rather than silently.

- name: restart prometheus
  ansible.builtin.systemd:
    name: prometheus
    state: restarted
