---
- name: Create traefik system user
  ansible.builtin.user:
    name: traefik
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: traefik
    group: traefik
    mode: "0750"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_config_dir }}/conf.d"

- name: Download Traefik binary archive
  ansible.builtin.get_url:
    url: "{{ traefik_binary_url }}"
    dest: "/tmp/traefik_v{{ traefik_version }}_linux_amd64.tar.gz"
    mode: "0644"
  register: traefik_download

- name: Extract Traefik binary
  ansible.builtin.unarchive:
    src: "/tmp/traefik_v{{ traefik_version }}_linux_amd64.tar.gz"
    dest: "{{ traefik_install_dir }}"
    remote_src: true
    include:
      - traefik
    owner: root
    group: root
    mode: "0755"
  when: traefik_download.changed
  notify: restart traefik

- name: Deploy static config traefik.yml
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: traefik
    group: traefik
    mode: "0640"
  notify: restart traefik

- name: Deploy traefik.env (Cloudflare token)
  ansible.builtin.template:
    src: traefik.env.j2
    dest: "{{ traefik_env_file }}"
    owner: traefik
    group: traefik
    mode: "0600"

- name: Deploy dynamic config — vaultwarden
  ansible.builtin.template:
    src: conf.d/vaultwarden.yml.j2
    dest: "{{ traefik_config_dir }}/conf.d/vaultwarden.yml"
    owner: traefik
    group: traefik
    mode: "0640"

- name: Deploy dynamic config — wikijs
  ansible.builtin.template:
    src: conf.d/wikijs.yml.j2
    dest: "{{ traefik_config_dir }}/conf.d/wikijs.yml"
    owner: traefik
    group: traefik
    mode: "0640"

- name: Deploy dynamic config — dashboard
  ansible.builtin.template:
    src: conf.d/dashboard.yml.j2
    dest: "{{ traefik_config_dir }}/conf.d/dashboard.yml"
    owner: traefik
    group: traefik
    mode: "0640"

- name: Deploy dynamic config — grafana
  ansible.builtin.template:
    src: conf.d/grafana.yml.j2
    dest: "{{ traefik_config_dir }}/conf.d/grafana.yml"
    owner: traefik
    group: traefik
    mode: "0640"

- name: Deploy dynamic config — loki
  ansible.builtin.template:
    src: conf.d/loki.yml.j2
    dest: "{{ traefik_config_dir }}/conf.d/loki.yml"
    owner: traefik
    group: traefik
    mode: "0640"

- name: Create acme.json with correct permissions
  ansible.builtin.file:
    path: "{{ traefik_acme_file }}"
    state: touch
    owner: traefik
    group: traefik
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart traefik

- name: Enable and start traefik service
  ansible.builtin.systemd:
    name: traefik
    enabled: true
    state: started
    daemon_reload: true
