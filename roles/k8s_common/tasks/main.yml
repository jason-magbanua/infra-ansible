---
# Common baseline tasks for all k8s lab nodes.

- name: Set bash history timestamp format
  ansible.builtin.copy:
    dest: /etc/profile.d/bash_history_timestamp.sh
    content: "export HISTTIMEFORMAT=\"%F %T \"\n"
    owner: root
    group: root
    mode: "0644"

- name: Add k8s lab hosts to /etc/hosts
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item }}"
    state: present
  loop:
    - "109.61.95.136  jm-k8s-control"
    - "109.61.95.137  jm-k8s-lin-worker1"
    - "109.61.95.138  jm-k8s-lin-worker2"

# Step 1: System Preparation
- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap entries in /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '#\1'

- name: Mask swap.target to prevent systemd re-enabling swap
  ansible.builtin.systemd:
    name: swap.target
    masked: true

- name: Configure kernel modules for k8s
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter
    owner: root
    group: root
    mode: "0644"

- name: Load k8s kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Configure sysctl parameters for k8s networking
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/k8s.conf
    state: present
    reload: true
  loop:
    - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
    - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }
    - { name: net.ipv4.ip_forward, value: "1" }

# Step 2: Install Container Runtime (containerd)
- name: Install containerd prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Download containerd archive
  ansible.builtin.get_url:
    url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/containerd-{{ containerd_version }}-linux-{{ containerd_arch }}.tar.gz"
    dest: "/tmp/containerd-{{ containerd_version }}-linux-{{ containerd_arch }}.tar.gz"
    mode: "0644"

- name: Extract containerd binaries
  ansible.builtin.unarchive:
    src: "/tmp/containerd-{{ containerd_version }}-linux-{{ containerd_arch }}.tar.gz"
    dest: /usr/local
    remote_src: true
    creates: /usr/local/bin/containerd

- name: Download containerd systemd service file
  ansible.builtin.get_url:
    url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
    dest: /etc/systemd/system/containerd.service
    owner: root
    group: root
    mode: "0644"
    force: false

- name: Enable and start containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started
    daemon_reload: true

- name: Install runc
  ansible.builtin.apt:
    name: runc
    state: present
    update_cache: true

# Step 3: Install Kubernetes Components
- name: Download Kubernetes GPG key
  ansible.builtin.shell:
    cmd: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | gpg --dearmor -o /usr/share/keyrings/kubernetes.gpg
    creates: /usr/share/keyrings/kubernetes.gpg

- name: Add Kubernetes apt repository
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/kubernetes.list
    line: "deb [signed-by=/usr/share/keyrings/kubernetes.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /"
    create: true
    mode: "0644"

- name: Install kubeadm, kubelet, and kubectl
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true

- name: Hold kubelet, kubeadm, and kubectl at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl

# Step 4: Configure Ephemeral Port Range
- name: Configure ephemeral port range for k8s NodePorts
  ansible.posix.sysctl:
    name: net.ipv4.ip_local_port_range
    value: "49152 65535"
    sysctl_file: /etc/sysctl.d/99-nodeport.conf
    state: present
    reload: true

# Step 5: Create Kubelet Configuration Patch
- name: Create /etc/kubernetes/patches directory
  ansible.builtin.file:
    path: /etc/kubernetes/patches
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Write kubelet configuration patch
  ansible.builtin.copy:
    dest: /etc/kubernetes/patches/kubeletconfiguration0+strategic.yaml
    owner: root
    group: root
    mode: "0644"
    content: |
      apiVersion: kubelet.config.k8s.io/v1beta1
      kind: KubeletConfiguration

      shutdownGracePeriod: 60s
      shutdownGracePeriodCriticalPods: 30s

      # Reserve resources for Kubernetes components (kubelet, containerd, CNI)
      kubeReserved:
        cpu: "200m"
        memory: "256Mi"
        ephemeral-storage: "1Gi"

      # Reserve resources for OS + agents (systemd, SSH, monitoring)
      systemReserved:
        cpu: "100m"
        memory: "256Mi"
        ephemeral-storage: "1Gi"

      # Eviction thresholds: graceful shutdown before kernel OOM
      evictionHard:
        memory.available: "100Mi"
        nodefs.available: "10%"
        imagefs.available: "15%"
        nodefs.inodesFree: "5%"

      evictionPressureTransitionPeriod: "5m0s"
