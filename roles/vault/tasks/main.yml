---
- name: Install dependencies
  ansible.builtin.apt:
    name:
      - unzip
      - curl
    state: present
    update_cache: true

- name: Create vault system group
  ansible.builtin.group:
    name: "{{ vault_group }}"
    system: true

- name: Create vault system user
  ansible.builtin.user:
    name: "{{ vault_user }}"
    group: "{{ vault_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /nonexistent
    create_home: false

- name: Create vault config directory
  ansible.builtin.file:
    path: "{{ vault_config_dir }}"
    state: directory
    owner: root
    group: "{{ vault_group }}"
    mode: "0750"

- name: Create vault data directory
  ansible.builtin.file:
    path: "{{ vault_data_dir }}"
    state: directory
    owner: "{{ vault_user }}"
    group: "{{ vault_group }}"
    mode: "0750"

- name: Download Vault zip archive
  ansible.builtin.get_url:
    url: "https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_linux_amd64.zip"
    dest: "/tmp/vault_{{ vault_version }}_linux_amd64.zip"
    checksum: "sha256:https://releases.hashicorp.com/vault/{{ vault_version }}/vault_{{ vault_version }}_SHA256SUMS"
    mode: "0644"
  register: vault_download

- name: Check if vault binary is installed
  ansible.builtin.stat:
    path: "{{ vault_install_dir }}/vault"
  register: vault_binary

- name: Extract vault binary
  ansible.builtin.unarchive:
    src: "/tmp/vault_{{ vault_version }}_linux_amd64.zip"
    dest: "{{ vault_install_dir }}"
    remote_src: true
    owner: root
    group: root
    mode: "0755"
  when: vault_download.changed or not vault_binary.stat.exists
  notify: restart vault

- name: Template vault.hcl
  ansible.builtin.template:
    src: vault.hcl.j2
    dest: "{{ vault_config_dir }}/vault.hcl"
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  notify: restart vault

- name: Template vault.env
  ansible.builtin.template:
    src: vault.env.j2
    dest: "{{ vault_config_dir }}/vault.env"
    owner: root
    group: "{{ vault_group }}"
    mode: "0640"
  no_log: true

- name: Deploy vault systemd service
  ansible.builtin.template:
    src: vault.service.j2
    dest: /etc/systemd/system/vault.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart vault

- name: Enable and start vault service
  ansible.builtin.systemd:
    name: vault
    enabled: true
    state: started
    daemon_reload: true

- name: Deploy Traefik file-provider config for vault
  ansible.builtin.template:
    src: traefik-vault.yml.j2
    dest: "{{ traefik_conf_dir }}/vault.yml"
    owner: root
    group: root
    mode: "0644"
  delegate_to: traefik
