---
vault_version: "1.18.3"
vault_user: vault
vault_group: vault
vault_install_dir: /usr/local/bin
vault_config_dir: /etc/vault.d
vault_data_dir: /var/lib/vault
vault_port: 8200
vault_cluster_port: 8201
vault_api_addr: "http://10.10.200.40:8200"
vault_cluster_addr: "http://10.10.200.40:8201"
vault_node_id: vault-01

# disable_mlock must be true in LXC — unprivileged containers cannot lock memory
vault_disable_mlock: true

# Traefik integration
traefik_conf_dir: /etc/traefik/conf.d
traefik_domain: magbanua.xyz
vault_hostname: vault
vault_ip: "10.10.200.40"
