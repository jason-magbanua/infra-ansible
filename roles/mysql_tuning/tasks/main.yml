- name: Install mysqltuner
  apt:
    name: mysqltuner
    state: present

- name: Create slow log directory
  file:
    path: /var/log/mysql
    state: directory
    owner: mysql
    group: mysql
    mode: '0755'

- name: Deploy tuning config
  template:
    src: mysql-tuning.cnf.j2
    dest: /etc/mysql/conf.d/mysql-tuning.cnf
  notify: Restart MySQL
