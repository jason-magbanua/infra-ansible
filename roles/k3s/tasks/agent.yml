---
- name: Get k3s node token from control plane
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_node_token_raw
  delegate_to: k3s-control

- name: Set k3s node token fact
  ansible.builtin.set_fact:
    k3s_node_token: "{{ k3s_node_token_raw['content'] | b64decode | trim }}"

- name: Download and install k3s agent
  ansible.builtin.shell: curl -sfL https://get.k3s.io | sh -
  args:
    creates: /usr/local/bin/k3s
  environment:
    INSTALL_K3S_VERSION: "{{ k3s_version }}"
    K3S_URL: "https://{{ k3s_server_ip }}:{{ k3s_server_port }}"
    K3S_TOKEN: "{{ k3s_node_token }}"

- name: Enable and start k3s-agent service
  ansible.builtin.systemd:
    name: k3s-agent
    enabled: true
    state: started
    daemon_reload: true

- name: Wait for node to register with API server
  ansible.builtin.command:
    cmd: kubectl get node {{ inventory_hostname }}
  delegate_to: k3s-control
  register: node_registered
  until: node_registered.rc == 0
  retries: 12
  delay: 10
  changed_when: false

- name: Label worker node
  ansible.builtin.command:
    cmd: kubectl label node {{ inventory_hostname }} node-role.kubernetes.io/worker=true --overwrite
  delegate_to: k3s-control
  changed_when: false
