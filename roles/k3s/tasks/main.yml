---
############################################################
# System upgrade + reboot
############################################################

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: full
    update_cache: true

- name: Check if reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required

- name: Reboot if kernel or packages require it
  ansible.builtin.reboot:
    reboot_timeout: 300
  when: reboot_required.stat.exists

############################################################
# Prerequisites
############################################################

- name: Install nfs-common
  ansible.builtin.apt:
    name: nfs-common
    state: present
    update_cache: true
    cache_valid_time: 3600

############################################################
# NFS data mount
############################################################

- name: Create NFS mount point
  ansible.builtin.file:
    path: "{{ k3s_nfs_mount }}"
    state: directory
    mode: "0755"

- name: Add NFS mount to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    regexp: "^[^#]\\S*\\s+{{ k3s_nfs_mount | regex_escape() }}\\s+"
    line: "{{ k3s_nfs_server }}:{{ k3s_nfs_export }} {{ k3s_nfs_mount }} nfs defaults,_netdev,nofail 0 0"
    state: present

- name: Check if NFS share is already mounted
  ansible.builtin.command: mountpoint -q {{ k3s_nfs_mount }}
  register: nfs_mountpoint
  changed_when: false
  failed_when: false

- name: Mount NFS share
  ansible.builtin.command: mount {{ k3s_nfs_mount }}
  when: nfs_mountpoint.rc != 0

############################################################
# k3s install
############################################################

- name: Install k3s server
  ansible.builtin.include_tasks: server.yml
  when: k3s_role == 'server'

- name: Install k3s agent
  ansible.builtin.include_tasks: agent.yml
  when: k3s_role == 'agent'
