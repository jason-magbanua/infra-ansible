---
- name: Install Redis
  ansible.builtin.apt:
    name: redis-server
    state: present
    update_cache: true

- name: Bind to VLAN IP and loopback
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: "^bind "
    line: "bind 127.0.0.1 {{ redis_bind_ip }}"
  notify: restart redis

- name: Disable protected-mode (explicit bind addresses set)
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: "^protected-mode"
    line: "protected-mode no"
  notify: restart redis

- name: Set maxmemory
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: "^#?maxmemory "
    line: "maxmemory {{ redis_maxmemory }}"
  notify: restart redis

- name: Set maxmemory-policy
  ansible.builtin.lineinfile:
    path: "{{ redis_config_file }}"
    regexp: "^#?maxmemory-policy"
    line: "maxmemory-policy {{ redis_maxmemory_policy }}"
  notify: restart redis

- name: Enable and start redis service
  ansible.builtin.systemd:
    name: redis-server
    enabled: true
    state: started
