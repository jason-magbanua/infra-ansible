---
# Sensitive vars — none required for Alloy (no auth in homelab config)

alloy_apt_key_url: "https://apt.grafana.com/gpg.key"
alloy_apt_key_dest: "/etc/apt/keyrings/grafana.gpg"
alloy_apt_repo: "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main"

alloy_config_dir: "/etc/alloy"
alloy_config_file: "/etc/alloy/config.alloy"
alloy_env_file: "/etc/default/alloy"
